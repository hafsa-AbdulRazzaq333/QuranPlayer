<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuranPlayer</title>
    <link rel="stylesheet" href="style.css">

<body>

        <div class="left ">
            <div class="close">
                <img width="30" class="invert" src="../img/close.svg" alt="">
            </div>
            <div class="home bg-grey m-1 p-1 rounded">
                <div class="logo">
                    <div class="img-logo"><img src="../img/logo.png" alt=""></div>
                    <div class="text">QuranPlayer</div>
                </div>
                <ul>
                    <li><img src="../img/home.svg" class="invert" alt="home">Home</li>
                    <li><img src="../img/search.svg" class="invert" alt="search">Search</li>
                </ul>
            </div>

            <div class="library bg-grey m-1 p-1 rounded">
                <div class="heading">
                    <img src="../img/playlist.svg" class="invert" alt="">
                    <h2>Your Library</h2>
                </div>
                <div class="playNlist">
                    <ul>

                            </div>
                        </li> -->
                    </ul>
                </div>
            </div>
        </div>

        <div class="right rounded">
            <div class="header">
                <div class="nav">
                    <div class="hamburgerContainer">

                        <img width="40" class="invert hamburger" src="../img/hamburger.svg" alt="">

                    </svg>

                            stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />

                </div>
                <div class="buttons">
                    <button class="signupbtn">Sign Up</button>
                    <button class="loginbtn">Login</button>
                </div>
            </div>

            <div class="playbar">
                <div class="seekbar">
                    <div class="circle"></div>
                </div>
                <div class="abovebar">
                    <div class="playinfo"></div>
                    <div class="playbuttons">
                        <img width="30" id="previous" src="../img/prevsong.svg" alt="">
                        <img width="30" id="play" src="../img/play.svg" alt="">
                        <img width="30" id="next" src="../img/nextsong.svg" alt="">
                    </div>
                    <div class="playtime"></div>
